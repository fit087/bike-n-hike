<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════════════╗
  ║  FAZENDA CONTINENTE — ITINERÁRIO INTERATIVO                                 ║
  ║  Arquivo: Fazenda_Continente_Itinerario.html                                ║
  ║  Descrição: Visualizador de rota GPS para cicloturismo em Juiz de Fora, MG  ║
  ║  Fonte dos dados: arquivo GPX exportado do Strava (Adolfo Correa)           ║
  ║                                                                              ║
  ║  ESTRUTURA DO DOCUMENTO:                                                    ║
  ║    1. <head>   — metadados, fontes Google, estilos CSS                      ║
  ║    2. <header> — barra superior com título e estatísticas da rota           ║
  ║    3. <aside>  — sidebar com lista de waypoints e legenda                   ║
  ║    4. #map-wrap / #mapCanvas  — mapa interativo renderizado em Canvas 2D    ║
  ║    5. #elev-wrap / #elevCanvas — perfil de elevação em Canvas 2D            ║
  ║    6. <script> — lógica JS: dados GPX, motor de mapa, eventos               ║
  ║                                                                              ║
  ║  DEPENDÊNCIAS EXTERNAS:                                                     ║
  ║    • Google Fonts (opcional — fallback para fontes do sistema se offline)   ║
  ║    • Nenhuma biblioteca JS externa (zero dependências)                      ║
  ║                                                                              ║
  ║  COMPATIBILIDADE: Chrome 80+, Firefox 75+, Safari 13+, Edge 80+             ║
  ╚══════════════════════════════════════════════════════════════════════════════╝
-->
<html lang="pt-BR">

<!-- ═══════════════════════════════════════════════════════════════════════════
     HEAD — Metadados e estilos
     • Google Fonts carregadas via @import no CSS (pode ser removido se offline)
     • Todas as variáveis de cor definidas em :root para fácil manutenção
     ═══════════════════════════════════════════════════════════════════════════ -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazenda Continente — Itinerário</title>

<style>
/* ── FONTES ──────────────────────────────────────────────────────────────────
   Bebas Neue  → títulos e números grandes (display font)
   DM Mono     → rótulos, coordenadas, dados técnicos
   DM Sans     → texto corrido e descrições
   NOTA: Se o Google Fonts estiver indisponível, o browser usará os fallbacks
         ('Arial Black', monospace, 'Segoe UI') definidos em cada regra.
   ──────────────────────────────────────────────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap');

/* ── PALETA DE CORES ─────────────────────────────────────────────────────────
   Todas as cores da interface estão centralizadas aqui como variáveis CSS.
   Para alterar o tema visual, basta modificar estes valores.

   --accent  → verde-lima  : rota principal, partida, picos
   --accent2 → laranja     : curvas/desvios
   --accent3 → azul-ciano  : bifurcações
   --danger  → vermelho    : chegada, descidas
   --muted   → cinza-médio : texto secundário, rótulos
   ──────────────────────────────────────────────────────────────────────────── */
:root {
  --bg:      #0e0f0d;  /* fundo geral da página */
  --surface: #161714;  /* superfície de painéis (sidebar, elevação) */
  --border:  #2a2b27;  /* bordas e separadores */
  --accent:  #c8f060;  /* verde-lima — cor primária de destaque */
  --accent2: #f0a040;  /* laranja — curvas */
  --accent3: #60c8f0;  /* ciano  — bifurcações */
  --text:    #e8e9e3;  /* texto principal */
  --muted:   #7a7b74;  /* texto secundário / rótulos */
  --danger:  #f06060;  /* vermelho — chegada / descidas */
}

/* ── RESET E BASE ────────────────────────────────────────────────────────────
   overflow:hidden no body evita barras de rolagem indesejadas.
   O layout usa height:100vh + flexbox para preencher a janela exata.
   ──────────────────────────────────────────────────────────────────────────── */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans','Segoe UI',sans-serif; font-weight:300;
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}

/* ════════════════════════════════════════════════════════════════════════════
   ÁREA 1: HEADER — Barra superior da página
   ────────────────────────────────────────────────────────────────────────────
   Layout: grid de 2 colunas
     • Coluna esquerda  → título da rota + subtítulo
     • Coluna direita   → estatísticas numéricas (distância, subida, altitude)
   flex-shrink:0 impede que o header encolha quando o conteúdo abaixo cresce.
   ════════════════════════════════════════════════════════════════════════════ */
header {
  display:grid; grid-template-columns:1fr auto; align-items:end;
  padding:1.5rem 2rem 1rem; border-bottom:1px solid var(--border);
  gap:1rem; flex-shrink:0;
}

/* Título principal da rota — fonte display em destaque */
.route-title {
  font-family:'Bebas Neue','Arial Black',sans-serif;
  font-size:clamp(2.2rem,4.5vw,4rem); /* responsivo: min 2.2rem, ideal 4.5vw, max 4rem */
  letter-spacing:.04em; line-height:.95;
  color:var(--accent); text-shadow:0 0 40px rgba(200,240,96,.2);
}

/* Subtítulo com localização e tipo de atividade */
.route-subtitle {
  font-size:.68rem; font-family:'DM Mono',monospace; color:var(--muted);
  letter-spacing:.14em; text-transform:uppercase; margin-top:.3rem;
}

/* Container das estatísticas no lado direito do header */
.stats-header { display:flex; gap:1.5rem; text-align:right; }

/* Cada bloco de estatística (valor + rótulo) */
.stat-item { display:flex; flex-direction:column; gap:.1rem; }

/* Número grande da estatística */
.stat-val {
  font-family:'Bebas Neue','Arial Black',sans-serif;
  font-size:1.8rem; color:var(--text); line-height:1;
}
/* Unidade da estatística (km, m) em tamanho menor */
.stat-val span { font-size:.8rem; color:var(--muted); }

/* Rótulo descritivo abaixo do valor */
.stat-label {
  font-family:'DM Mono',monospace; font-size:.58rem;
  letter-spacing:.15em; color:var(--muted); text-transform:uppercase;
}

/* ════════════════════════════════════════════════════════════════════════════
   LAYOUT PRINCIPAL — <main>
   ────────────────────────────────────────────────────────────────────────────
   Grid de 2 colunas:
     • 300px   → sidebar (lista de waypoints)
     • 1fr     → painel direito (mapa + elevação)
   min-height:0 é necessário para que elementos filhos com overflow funcionem
   corretamente dentro de um flex container.
   ════════════════════════════════════════════════════════════════════════════ */
main { display:grid; grid-template-columns:300px 1fr; flex:1; min-height:0; overflow:hidden; }

/* ════════════════════════════════════════════════════════════════════════════
   ÁREA 2: SIDEBAR — Lista de waypoints e legenda
   ────────────────────────────────────────────────────────────────────────────
   Estrutura interna:
     • .section-title  → cabeçalho fixo "Pontos de Referência"
     • #wpList         → lista rolável de waypoints (gerada via JS)
     • .legend         → legenda de cores na parte inferior
   ════════════════════════════════════════════════════════════════════════════ */
.sidebar {
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}

/* Cabeçalho fixo da sidebar — não rola com a lista */
.section-title {
  font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.2em;
  text-transform:uppercase; color:var(--muted);
  padding:.9rem 1.2rem .5rem; border-bottom:1px solid var(--border);
  background:var(--surface); flex-shrink:0;
}

/* Container rolável que contém todos os waypoints */
.waypoint-list { flex:1; overflow-y:auto; }

/* Scrollbar customizada (apenas Webkit/Blink) */
.waypoint-list::-webkit-scrollbar { width:3px; }
.waypoint-list::-webkit-scrollbar-thumb { background:var(--border); }

/* ── Cada item de waypoint na sidebar ───────────────────────────────────────
   Grid de 2 colunas:
     • 34px  → coluna da linha vertical + ponto colorido
     • 1fr   → coluna com texto (km, nome, descrição, tags)
   ──────────────────────────────────────────────────────────────────────────── */
.waypoint { display:grid; grid-template-columns:34px 1fr; cursor:pointer; transition:background .15s; }
.waypoint:hover  { background:rgba(200,240,96,.04); }
.waypoint.active { background:rgba(200,240,96,.08); } /* selecionado via clique */

/* Coluna esquerda: ponto circular + linha vertical de conexão */
.wp-line { display:flex; flex-direction:column; align-items:center; padding:.7rem 0; }

/* Ponto colorido que representa o tipo de waypoint.
   A cor varia por tipo via regras abaixo (.waypoint.start, .turn, etc.) */
.wp-dot {
  width:9px; height:9px; border-radius:50%;
  border:2px solid var(--accent); background:var(--bg);
  flex-shrink:0; z-index:2; transition:box-shadow .2s;
}

/* ── Variações de cor por tipo de waypoint ──────────────────────────────────
   DEPURAÇÃO: Se um ponto não aparece com a cor correta, verificar se o campo
   'type' no array waypoints (no JS) corresponde exatamente às classes abaixo.
   Tipos válidos: 'start' | 'end' | 'turn' | 'bifurcation' | 'peak'
   ──────────────────────────────────────────────────────────────────────────── */
.waypoint.start .wp-dot { width:13px; height:13px; background:var(--accent); }              /* verde sólido — maior */
.waypoint.end   .wp-dot { width:13px; height:13px; background:var(--danger); border-color:var(--danger); } /* vermelho sólido */
.waypoint.turn  .wp-dot { border-color:var(--accent2); background:rgba(240,160,64,.2); }    /* anel laranja */
.waypoint.bifurcation .wp-dot { border-color:var(--accent3); background:rgba(96,200,240,.2); width:11px; height:11px; } /* anel ciano, ligeiramente maior */
.waypoint.peak  .wp-dot { border-color:var(--accent); background:rgba(200,240,96,.2); }     /* anel verde */

/* Halo ao redor do ponto quando o item está ativo (selecionado) */
.waypoint.active .wp-dot { box-shadow:0 0 0 3px rgba(200,240,96,.25); }

/* Linha vertical que conecta os pontos entre si */
.wp-connector { width:1px; flex:1; background:var(--border); margin-top:2px; }
.waypoint:last-child .wp-connector { display:none; } /* sem linha após o último item */

/* Coluna direita: informações textuais do waypoint */
.wp-info { padding:.7rem .9rem .7rem 0; border-bottom:1px solid rgba(42,43,39,.5); }
.wp-km   { font-family:'DM Mono',monospace; font-size:.58rem; color:var(--muted); letter-spacing:.08em; margin-bottom:.15rem; }
.wp-name { font-size:.82rem; font-weight:400; color:var(--text); line-height:1.3; }
.wp-desc { font-size:.68rem; color:var(--muted); margin-top:.15rem; }
.wp-tags { margin-top:.25rem; display:flex; gap:.25rem; flex-wrap:wrap; }

/* ── Tags de categoria dos waypoints ────────────────────────────────────────
   Cada tag é uma etiqueta colorida que indica a natureza do ponto.
   As classes CSS são aplicadas via JS usando o dicionário TC (tag classes).
   ──────────────────────────────────────────────────────────────────────────── */
.tag { font-family:'DM Mono',monospace; font-size:.52rem; letter-spacing:.08em; padding:.1rem .35rem; border-radius:2px; text-transform:uppercase; }
.tag-turn    { background:rgba(240,160,64,.12); color:var(--accent2); border:1px solid rgba(240,160,64,.3); }
.tag-bifurc  { background:rgba(96,200,240,.1);  color:var(--accent3); border:1px solid rgba(96,200,240,.3); }
.tag-climb   { background:rgba(200,240,96,.1);  color:var(--accent);  border:1px solid rgba(200,240,96,.25); }
.tag-descent { background:rgba(240,96,96,.1);   color:var(--danger);  border:1px solid rgba(240,96,96,.25); }
.tag-start   { background:rgba(200,240,96,.2);  color:var(--accent);  border:1px solid var(--accent); }
.tag-end     { background:rgba(240,96,96,.2);   color:var(--danger);  border:1px solid var(--danger); }

/* Legenda de cores na parte inferior da sidebar */
.legend { padding:.7rem 1.2rem; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:.4rem .9rem; flex-shrink:0; }
.legend-item { display:flex; align-items:center; gap:.3rem; font-size:.62rem; color:var(--muted); font-family:'DM Mono',monospace; }
.legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ════════════════════════════════════════════════════════════════════════════
   PAINEL DIREITO — Contém o mapa e o gráfico de elevação empilhados
   flex-direction:column distribui o espaço vertical:
     • #map-wrap   → flex:1 (ocupa todo o espaço disponível)
     • #elev-wrap  → altura fixa (definida pelo canvas de 75px + padding)
   ════════════════════════════════════════════════════════════════════════════ */
.right-panel { display:flex; flex-direction:column; min-height:0; overflow:hidden; }

/* ════════════════════════════════════════════════════════════════════════════
   ÁREA 3: MAPA — #map-wrap e #mapCanvas
   ────────────────────────────────────────────────────────────────────────────
   O container #map-wrap é position:relative para ancorar os elementos
   sobrepostos (badge de info, botões de zoom, tooltip).
   O canvas ocupa 100% do container — o tamanho real em pixels é calculado
   em JS via devicePixelRatio para telas de alta densidade (Retina/HiDPI).
   ════════════════════════════════════════════════════════════════════════════ */
#map-wrap {
  flex:1; position:relative; min-height:0;
  overflow:hidden; background:#111210;
}

/* O canvas de mapa preenche todo o container via CSS (width/height:100%).
   O tamanho real em pixels (mc.width/mc.height) é definido em JS.
   DEPURAÇÃO: Se o mapa aparecer borrado em telas Retina, verificar se
   devicePixelRatio está sendo aplicado corretamente na função drawMap(). */
canvas#mapCanvas { display:block; width:100%; height:100%; cursor:grab; }
canvas#mapCanvas:active { cursor:grabbing; }

/* Badge informativo sobreposto ao mapa (canto superior direito)
   pointer-events:none → não captura cliques, deixa o mapa clicável abaixo */
.map-badge {
  position:absolute; top:.8rem; right:.8rem;
  background:rgba(14,15,13,.85); border:1px solid var(--border); border-radius:4px;
  padding:.45rem .7rem; font-family:'DM Mono',monospace; font-size:.58rem;
  color:var(--muted); pointer-events:none; line-height:1.7;
}
.map-badge strong { color:var(--text); }

/* Botões de zoom sobrepostos (canto inferior direito do mapa)
   IDs: #zoomIn (+), #zoomOut (−), #zoomFit (⊡)
   Os event listeners estão definidos na seção "Zoom buttons" no JS */
.zoom-controls { position:absolute; bottom:.8rem; right:.8rem; display:flex; flex-direction:column; gap:2px; }
.zoom-btn {
  width:26px; height:26px; background:rgba(22,23,20,.9); border:1px solid var(--border);
  color:var(--text); font-size:.95rem; cursor:pointer; display:flex; align-items:center;
  justify-content:center; user-select:none; transition:background .15s; border-radius:2px;
}
.zoom-btn:hover { background:var(--surface); }

/* Tooltip flutuante que aparece ao clicar em um waypoint no mapa.
   Posicionado dinamicamente via JS (showTip).
   display:none por padrão — alterado para 'block' ao mostrar.
   DEPURAÇÃO: Se o tooltip aparecer fora da tela, verificar a lógica de
   reposicionamento em showTip() que ajusta tx/ty nos limites do canvas. */
.map-tooltip {
  position:absolute; pointer-events:none;
  background:rgba(22,23,20,.94); border:1px solid var(--border); border-radius:3px;
  padding:.4rem .6rem; font-size:.7rem; color:var(--text);
  display:none; max-width:190px; z-index:10; line-height:1.5;
}
/* Linha de KM/altitude dentro do tooltip */
.map-tooltip .tt-km { font-family:'DM Mono',monospace; font-size:.58rem; color:var(--muted); }

/* ════════════════════════════════════════════════════════════════════════════
   ÁREA 4: PERFIL DE ELEVAÇÃO — #elev-wrap e #elevCanvas
   ────────────────────────────────────────────────────────────────────────────
   Painel fixo na parte inferior do painel direito.
   O canvas de 75px é desenhado em JS pela função drawElev().
   Contém: grade horizontal, área preenchida, linha de elevação e ticks
   coloridos para cada waypoint alinhados ao eixo X (quilometragem).
   ════════════════════════════════════════════════════════════════════════════ */
#elev-wrap {
  flex-shrink:0; border-top:1px solid var(--border);
  padding:.5rem 1rem .4rem; background:var(--surface);
}
/* Rótulo acima do gráfico */
.elev-title {
  font-family:'DM Mono',monospace; font-size:.56rem; letter-spacing:.15em;
  color:var(--muted); text-transform:uppercase; margin-bottom:.3rem;
}
/* Canvas do gráfico — altura fixa de 75px definida aqui via CSS.
   MANUTENÇÃO: Para aumentar a altura do gráfico, altere o valor aqui
   e também ajuste o padding de #elev-wrap se necessário. */
canvas#elevCanvas { display:block; width:100%; height:75px; }

/* ── RESPONSIVIDADE — telas estreitas (≤ 680px) ─────────────────────────────
   Em mobile, o layout muda de 2 colunas para 1 coluna empilhada:
     • mapa    → topo (60vh)
     • sidebar → base (40vh), rolável
   ──────────────────────────────────────────────────────────────────────────── */
@media(max-width:680px){
  main { grid-template-columns:1fr; grid-template-rows:60vh 40vh; }
  .sidebar { order:2; grid-row:2; max-height:40vh; }
  .right-panel { order:1; grid-row:1; }
  header { grid-template-columns:1fr; padding:1rem; }
  .stats-header { justify-content:flex-start; }
}
</style>
</head>

<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     ÁREA 1 — HEADER DA PÁGINA
     ───────────────────────────────────────────────────────────────────────────
     Contém duas seções lado a lado:
       • Bloco esquerdo  : título da rota (.route-title) e subtítulo (.route-subtitle)
       • Bloco direito   : três estatísticas numéricas (.stats-header)

     MANUTENÇÃO: Para alterar o nome da rota, editar o texto em .route-title.
     Para alterar as estatísticas, editar os valores dentro de .stat-val.
     ═══════════════════════════════════════════════════════════════════════════ -->
<header>

  <!-- Bloco esquerdo: identidade da rota -->
  <div>
    <!-- Nome principal da rota — fonte display Bebas Neue em verde-lima -->
    <div class="route-title">Fazenda Continente</div>
    <!-- Localização e tipo de atividade em fonte mono discreta -->
    <div class="route-subtitle">Juiz de Fora · MG · Brasil · Cicloturismo</div>
  </div>

  <!-- Bloco direito: estatísticas numéricas da rota (extraídas do GPX) -->
  <div class="stats-header">

    <!-- Estatística 1: distância total -->
    <div class="stat-item">
      <div class="stat-val">39.3<span> km</span></div>
      <div class="stat-label">Distância</div>
    </div>

    <!-- Estatística 2: ganho de altitude acumulado -->
    <div class="stat-item">
      <div class="stat-val">423<span> m</span></div>
      <div class="stat-label">Subida total</div>
    </div>

    <!-- Estatística 3: faixa de altitude (mínima e máxima) -->
    <div class="stat-item">
      <div class="stat-val">683<span>–</span>826<span> m</span></div>
      <div class="stat-label">Altitude</div>
    </div>

  </div>
</header><!-- fim HEADER -->


<!-- ═══════════════════════════════════════════════════════════════════════════
     LAYOUT PRINCIPAL
     Grid de 2 colunas: sidebar (300px) | painel direito (1fr)
     ═══════════════════════════════════════════════════════════════════════════ -->
<main>

  <!-- ═══════════════════════════════════════════════════════════════════════
       ÁREA 2 — SIDEBAR
       ─────────────────────────────────────────────────────────────────────
       Estrutura em 3 partes (flex column):
         1. .section-title  → cabeçalho fixo (não rola)
         2. #wpList         → lista de waypoints gerada dinamicamente pelo JS
         3. .legend         → legenda de cores, fixada na base da sidebar

       MANUTENÇÃO: Os waypoints são gerados por JS a partir do array `waypoints`.
       Para adicionar ou remover pontos, editar o array no bloco DATA do script.
       ═══════════════════════════════════════════════════════════════════════ -->
  <aside class="sidebar">

    <!-- Cabeçalho fixo da sidebar -->
    <div class="section-title">Pontos de Referência</div>

    <!-- Container da lista de waypoints — preenchido dinamicamente pelo JS.
         Cada item .waypoint é criado na seção "Sidebar" do script.
         Ao clicar num item: destaca-o (classe .active), centraliza o mapa
         no waypoint e exibe o tooltip. -->
    <div class="waypoint-list" id="wpList">
      <!-- Os itens .waypoint são inseridos aqui via JavaScript -->
    </div>

    <!-- Legenda de cores na base da sidebar
         Deve refletir os tipos de waypoints definidos no array `waypoints`. -->
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--accent)"></div>
        Partida/Chegada
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(240,160,64,.85)"></div>
        Curva
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(96,200,240,.85)"></div>
        Bifurcação
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:rgba(200,240,96,.5)"></div>
        Pico
      </div>
    </div>

  </aside><!-- fim SIDEBAR -->


  <!-- ═══════════════════════════════════════════════════════════════════════
       PAINEL DIREITO — Mapa + Elevação empilhados verticalmente
       ═══════════════════════════════════════════════════════════════════════ -->
  <div class="right-panel">

    <!-- ═══════════════════════════════════════════════════════════════════
         ÁREA 3 — MAPA INTERATIVO (#map-wrap / #mapCanvas)
         ─────────────────────────────────────────────────────────────────
         O #map-wrap é o container posicionador (position:relative).
         Dentro dele existem 4 elementos sobrepostos:
           1. #mapCanvas   → canvas principal — toda a renderização ocorre aqui
           2. .map-badge   → overlay informativo (canto superior direito)
           3. .zoom-controls → botões +/−/⊡ (canto inferior direito)
           4. #mapTooltip  → tooltip flutuante ao clicar em waypoints

         A função drawMap() no JS é responsável por renderizar tudo no canvas.
         ═══════════════════════════════════════════════════════════════════ -->
    <div id="map-wrap">

      <!-- Canvas principal do mapa — toda a rota e waypoints são desenhados aqui.
           Tamanho real em pixels definido por JS (mc.width, mc.height).
           Interações: arrastar para mover, scroll para zoom, clique para tooltip. -->
      <canvas id="mapCanvas"></canvas>

      <!-- Overlay informativo — aparece no canto superior direito do mapa.
           pointer-events:none (no CSS) garante que não intercepte cliques no canvas. -->
      <div class="map-badge">
        <strong>GPS · 765 pts · 39.3km</strong><br>
        Scroll=zoom · Arraste=mover<br>
        Clique num ponto p/ detalhes
      </div>

/* ════════════════════════════════════════════════════════════════════════════
   BLOCO 2 — MAP ENGINE (motor do mapa Canvas 2D)
   ────────────────────────────────────────────────────────────────────────────
   Projeção utilizada: equiretangular com correção pelo cosseno da latitude.
   Adequada para áreas pequenas (< 50km) onde a distorção é desprezível.

   Sistema de coordenadas do mapa:
     • Coordenadas geográficas (lat/lon) → coordenadas normalizadas (nx, ny)
       via geo2n(), usando o centro da rota como origem.
     • Coordenadas normalizadas → pixels na tela via scale e offsets (offX, offY).

   Estado do viewport (variáveis mutáveis):
     scale  → pixels por unidade normalizada (zoom atual)
     offX   → deslocamento horizontal em pixels (pan)
     offY   → deslocamento vertical em pixels (pan)
   ════════════════════════════════════════════════════════════════════════════ */

/* Referência ao canvas do mapa e seu contexto 2D */
const mc = document.getElementById('mapCanvas');
const mx = mc.getContext('2d');

/* Fator de correção da projeção: compensa o achatamento dos meridianos
   em latitudes diferentes de 0°. Centro aproximado da rota: -21.685° S */
const cosLat = Math.cos(-21.685 * Math.PI / 180);

/* Estado atual do viewport — modificado por pan, zoom e fitBounds() */
let scale = 1, offX = 0, offY = 0;

/* Estado do arraste (pan com mouse) */
let dragging = false, dStart, oStart;

/**
 * geo2n — Converte coordenadas geográficas para espaço normalizado.
 * O ponto (lat=-21.685, lon=-43.385) é a origem (0, 0).
 * O eixo Y é invertido (lat crescente = Y decrescente) para que Norte fique em cima.
 *
 * @param {number} lat  latitude em graus decimais
 * @param {number} lon  longitude em graus decimais
 * @returns {[number, number]} [nx, ny] coordenadas normalizadas
 */
function geo2n(lat, lon) {
  return [(lon - (-43.385)) * cosLat, -(lat - (-21.685))];
}

/**
 * fitBounds — Calcula scale, offX, offY para encaixar toda a rota no canvas.
 * Chamada na inicialização e ao pressionar o botão ⊡.
 * pad=0.1 adiciona 10% de margem ao redor da rota.
 *
 * DEPURAÇÃO: Se a rota aparecer cortada, aumentar o valor de pad.
 */
function fitBounds() {
  const W = mc.offsetWidth, H = mc.offsetHeight;
  const pts = track.map(p => geo2n(p[0], p[1]));
  const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
  const mnx=Math.min(...xs), mxx=Math.max(...xs);
  const mny=Math.min(...ys), mxy=Math.max(...ys);
  const rx=mxx-mnx, ry=mxy-mny, pad=0.1;
  /* escala = menor entre o fator horizontal e vertical (mantém proporção) */
  scale = Math.min(W / (rx * (1+pad*2)), H / (ry * (1+pad*2)));
  /* offsets centram a rota no canvas */
  offX = ((mnx+mxx)/2)*scale - W/2;
  offY = ((mny+mxy)/2)*scale - H/2;
}

/**
 * toScreen — Converte lat/lon para coordenadas em pixels na tela.
 * Aplica a projeção geo2n() e depois o viewport (scale + offsets).
 *
 * @param {number} lat
 * @param {number} lon
 * @returns {[number, number]} [x, y] em pixels CSS
 */
function toScreen(lat, lon) {
  const [nx, ny] = geo2n(lat, lon);
  return [nx*scale - offX, ny*scale - offY];
}

/**
 * drawMap — Função principal de renderização do mapa.
 * Redesenha o canvas inteiro a cada frame (pan/zoom/redimensionamento).
 * Ordem de renderização (back-to-front):
 *   1. Fundo escuro
 *   2. Grade de pontos
 *   3. Rota GPS (glow + linha principal)
 *   4. Setas de direção
 *   5. Marcadores de waypoints
 *   6. Rosa dos ventos (canto superior direito)
 *
 * DEPURAÇÃO: Se o canvas aparecer em branco, verificar se mc.offsetWidth/Height
 * são > 0 (o container precisa ter dimensões visíveis ao chamar drawMap()).
 */
function drawMap() {
  const dpr = window.devicePixelRatio || 1; /* suporte a telas HiDPI/Retina */
  const W = mc.offsetWidth, H = mc.offsetHeight;

  /* Redimensiona o canvas apenas se necessário (evita reset de estado desnecessário) */
  if (mc.width !== W*dpr || mc.height !== H*dpr) {
    mc.width = W*dpr; mc.height = H*dpr;
    mx.scale(dpr, dpr); /* escala o contexto para DPR */
    fitBounds();        /* recalcula viewport ao redimensionar */
  }

  /* 1. Limpa e preenche o fundo */
  mx.clearRect(0, 0, W, H);
  mx.fillStyle='#111210'; mx.fillRect(0, 0, W, H);

  /* 2. Grade de pontos decorativos (estética) */
  mx.fillStyle='rgba(42,43,39,0.45)';
  for(let x=0; x<W; x+=28)
    for(let y=0; y<H; y+=28)
      mx.fillRect(x, y, 1, 1);

  /* 3a. Rota GPS — linha principal */
  mx.beginPath();
  const [sx0,sy0] = toScreen(track[0][0], track[0][1]);
  mx.moveTo(sx0, sy0);
  for(let i=1; i<track.length; i++){
    const [sx,sy] = toScreen(track[i][0], track[i][1]);
    mx.lineTo(sx, sy);
  }
  mx.strokeStyle='rgba(200,240,96,0.72)'; mx.lineWidth=2.5;
  mx.lineCap='round'; mx.lineJoin='round'; mx.stroke();

  /* 3b. Rota GPS — glow suave em volta da linha (efeito luminoso) */
  mx.beginPath();
  mx.moveTo(sx0, sy0);
  for(let i=1; i<track.length; i++){
    const [sx,sy] = toScreen(track[i][0], track[i][1]);
    mx.lineTo(sx, sy);
  }
  mx.strokeStyle='rgba(200,240,96,0.12)'; mx.lineWidth=7; mx.stroke();

  /* 4. Setas de direção — desenhadas a cada 24 pontos ao longo da rota.
        Calculam o ângulo entre dois pontos consecutivos para orientar a seta.
        MANUTENÇÃO: Ajustar o valor 24 para aumentar/diminuir a frequência. */
  mx.fillStyle='rgba(200,240,96,0.38)';
  for(let i=12; i<track.length-8; i+=24){
    const [x1,y1] = toScreen(track[i][0], track[i][1]);
    const [x2,y2] = toScreen(track[i+5][0], track[i+5][1]);
    const ang = Math.atan2(y2-y1, x2-x1); /* ângulo em radianos */
    const s = 4.5; /* tamanho da seta em pixels */
    mx.save();
    mx.translate((x1+x2)/2, (y1+y2)/2); /* posiciona no meio do segmento */
    mx.rotate(ang);
    mx.beginPath(); mx.moveTo(s,0); mx.lineTo(-s,-s*.6); mx.lineTo(-s,s*.6);
    mx.closePath(); mx.fill();
    mx.restore();
  }

  /* 5. Waypoints — marcadores coloridos sobre a rota.
        WPC → cores por tipo (Waypoint Point Colors)
        WPS → raios por tipo (Waypoint Point Sizes)
        Para cada waypoint: glow externo → anel extra (só bifurcações) → ponto central */
  const WPC = {start:'#c8f060', end:'#f06060', bifurcation:'#60c8f0', turn:'#f0a040', peak:'#c8f060'};
  const WPS = {start:7, end:7, bifurcation:6, turn:4.5, peak:5.5};
  waypoints.forEach(wp => {
    const [sx,sy] = toScreen(wp.lat, wp.lon);
    const c = WPC[wp.type] || '#f0a040'; /* cor fallback: laranja */
    const r = WPS[wp.type] || 4.5;       /* raio fallback: 4.5px */

    /* Glow suave ao redor do marcador */
    mx.beginPath(); mx.arc(sx, sy, r+5, 0, Math.PI*2);
    mx.fillStyle = c+'18'; mx.fill(); /* cor hex + alpha '18' = ~9% opacidade */

    /* Anel extra animado apenas para bifurcações (destaque visual maior) */
    if(wp.type === 'bifurcation'){
      mx.beginPath(); mx.arc(sx, sy, r+3, 0, Math.PI*2);
      mx.strokeStyle = c+'55'; mx.lineWidth=1; mx.stroke();
    }

    /* Ponto central: sólido para start/end, oco (fundo escuro) para os demais */
    mx.beginPath(); mx.arc(sx, sy, r, 0, Math.PI*2);
    mx.fillStyle = (wp.type==='start' || wp.type==='end') ? c : '#111210';
    mx.fill();
    mx.strokeStyle = c; mx.lineWidth=1.8; mx.stroke();
  });

  /* 6. Rosa dos ventos — indicador de orientação no canto superior direito.
        Triângulo norte verde-lima (accent), triângulo sul cinza escuro. */
  const cx=W-36, cy=36, cr=14;
  mx.save(); mx.globalAlpha=.4;
  /* Ponteiro Norte */
  mx.beginPath(); mx.moveTo(cx,cy-cr); mx.lineTo(cx-cr*.35,cy); mx.lineTo(cx+cr*.35,cy);
  mx.closePath(); mx.fillStyle='#c8f060'; mx.fill();
  /* Ponteiro Sul */
  mx.beginPath(); mx.moveTo(cx,cy+cr); mx.lineTo(cx-cr*.35,cy); mx.lineTo(cx+cr*.35,cy);
  mx.closePath(); mx.fillStyle='#444'; mx.fill();
  /* Letra N */
  mx.globalAlpha=.65; mx.fillStyle='#c8f060'; mx.font=`bold ${cr*.6}px monospace`;
  mx.textAlign='center'; mx.fillText('N', cx, cy-cr-3);
  mx.restore();
}


/* ════════════════════════════════════════════════════════════════════════════
   BLOCO 3 — GRÁFICO DE ELEVAÇÃO
   ────────────────────────────────────────────────────────────────────────────
   Renderiza o perfil de elevação no canvas #elevCanvas.
   Camadas desenhadas (back-to-front):
     1. Fundo escuro (#161714)
     2. Linhas horizontais de grade (700, 750, 800, 850m)
     3. Área preenchida com gradiente verde-lima
     4. Linha de elevação em verde-lima
     5. Ticks verticais coloridos por tipo de waypoint (eixo X)
     6. Rótulos de quilometragem (eixo X)

   Parâmetros de manutenção:
     minE / maxE → faixa de altitude visível no gráfico (em metros)
     pL,pR,pT,pB → padding interno do gráfico (left/right/top/bottom)
   ════════════════════════════════════════════════════════════════════════════ */
const ec   = document.getElementById('elevCanvas');
const ectx = ec.getContext('2d');

function drawElev() {
  const dpr = window.devicePixelRatio || 1;
  const W = ec.offsetWidth, H = ec.offsetHeight;
  /* Redimensiona sempre (o painel pode variar) */
  ec.width = W*dpr; ec.height = H*dpr; ectx.scale(dpr, dpr);

  /* Faixa de altitude visível e padding interno do gráfico */
  const minE=650, maxE=860;
  const pL=5, pR=5, pT=5, pB=16; /* padding: left, right, top, bottom */
  const w=W-pL-pR, h=H-pT-pB;    /* área útil de desenho */

  /* Funções de mapeamento: quilometragem/altitude → pixels */
  const toX = km => pL + (km / 39.3) * w; /* 39.3 = distância total da rota */
  const toY  = e  => pT + h - ((e - minE) / (maxE - minE)) * h;

  /* 1. Fundo */
  ectx.fillStyle='#161714'; ectx.fillRect(0, 0, W, H);

  /* 2. Grade horizontal com rótulos de altitude */
  ectx.strokeStyle='rgba(42,43,39,.8)'; ectx.lineWidth=.5;
  [700, 750, 800, 850].forEach(e => {
    ectx.beginPath(); ectx.moveTo(pL, toY(e)); ectx.lineTo(pL+w, toY(e)); ectx.stroke();
    ectx.fillStyle='rgba(122,123,116,.5)'; ectx.font='6.5px monospace';
    ectx.fillText(e+'m', pL+2, toY(e)-2); /* rótulo no lado esquerdo */
  });

  /* 3. Área preenchida sob a curva — gradiente de cima para baixo */
  const g = ectx.createLinearGradient(0, pT, 0, pT+h);
  g.addColorStop(0, 'rgba(200,240,96,.3)'); /* topo: mais opaco */
  g.addColorStop(1, 'rgba(200,240,96,.02)'); /* base: quase transparente */
  ectx.beginPath();
  ectx.moveTo(toX(elevData[0][0]), toY(elevData[0][1]));
  elevData.forEach(([km, e]) => ectx.lineTo(toX(km), toY(e)));
  ectx.lineTo(toX(elevData[elevData.length-1][0]), pT+h); /* fecha abaixo à direita */
  ectx.lineTo(toX(0), pT+h);                               /* fecha abaixo à esquerda */
  ectx.closePath(); ectx.fillStyle=g; ectx.fill();

  /* 4. Linha de elevação sobre a área */
  ectx.beginPath();
  ectx.moveTo(toX(elevData[0][0]), toY(elevData[0][1]));
  elevData.forEach(([km, e]) => ectx.lineTo(toX(km), toY(e)));
  ectx.strokeStyle='#c8f060'; ectx.lineWidth=1.5; ectx.lineJoin='round'; ectx.stroke();

  /* 5. Ticks coloridos no eixo X — um por waypoint, cor = tipo.
        C2 (Color map 2) — mesmo mapeamento usado nos marcadores do mapa. */
  const C2 = {start:'#c8f060', end:'#f06060', bifurcation:'#60c8f0', turn:'#f0a040', peak:'#c8f060'};
  waypoints.forEach(wp => {
    const x = toX(wp.km);
    ectx.beginPath(); ectx.moveTo(x, pT+h+1); ectx.lineTo(x, pT+h+6);
    ectx.strokeStyle = C2[wp.type] || '#f0a040';
    ectx.lineWidth = wp.type==='bifurcation' ? 1.8 : 1; /* bifurcações com traço mais espesso */
    ectx.stroke();
  });

  /* 6. Rótulos de quilometragem no eixo X */
  ectx.fillStyle='rgba(122,123,116,.55)'; ectx.font='6.5px monospace'; ectx.textAlign='center';
  [0, 10, 20, 30, 39].forEach(km =>
    ectx.fillText(km===39 ? '39km' : km, toX(km), pT+h+13)
  );
}


/* ════════════════════════════════════════════════════════════════════════════
   BLOCO 4 — SIDEBAR: geração dinâmica dos itens de waypoint
   ────────────────────────────────────────────────────────────────────────────
   Para cada objeto no array `waypoints`, cria um elemento .waypoint no DOM
   e registra um event listener de clique.

   Dicionários de mapeamento:
     TL (Tag Labels)   → chave do tag → texto exibido na etiqueta
     TC (Tag Classes)  → chave do tag → classe CSS aplicada ao <span>
     WPC2              → tipo do waypoint → cor hexadecimal para o tooltip
   ════════════════════════════════════════════════════════════════════════════ */
const wpList = document.getElementById('wpList');

/* Mapeamento de chave de tag → rótulo exibido nas etiquetas coloridas */
const TL = {
  turn:'CURVA', bifurcation:'BIFURCAÇÃO', climb:'SUBIDA',
  descent:'DESCIDA', start:'PARTIDA', end:'CHEGADA',
  bifurc:'BIFURCAÇÃO', peak:'PICO'
};

/* Mapeamento de chave de tag → classe CSS da etiqueta (definidas no CSS) */
const TC = {
  turn:'tag-turn', bifurcation:'tag-bifurc', climb:'tag-climb',
  descent:'tag-descent', start:'tag-start', end:'tag-end',
  bifurc:'tag-bifurc', peak:'tag-climb'
};

/* Mapeamento de tipo de waypoint → cor para uso inline no tooltip */
const WPC2 = {
  start:'#c8f060', end:'#f06060',
  bifurcation:'#60c8f0', turn:'#f0a040', peak:'#c8f060'
};

/* Cria e insere cada item da sidebar */
waypoints.forEach((wp, idx) => {
  const div = document.createElement('div');
  div.className = `waypoint ${wp.type}`; /* classe de tipo define a cor do ponto */

  /* Gera o HTML das etiquetas a partir do array tags[] do waypoint */
  const tags = wp.tags.map(t =>
    `<span class="tag ${TC[t]||'tag-turn'}">${TL[t]||t}</span>`
  ).join('');

  /* Estrutura interna do item:
       .wp-line  → coluna esquerda com ponto + linha vertical
       .wp-info  → coluna direita com km, nome, descrição e etiquetas
     A descrição exibida é a parte após o primeiro '·' (texto secundário). */
  div.innerHTML = `
    <div class="wp-line">
      <div class="wp-dot"></div>
      <div class="wp-connector"></div>
    </div>
    <div class="wp-info">
      <div class="wp-km">KM ${wp.km.toFixed(1)} · ${wp.ele}m alt.</div>
      <div class="wp-name">${wp.name}</div>
      <div class="wp-desc">${wp.desc.split('·').slice(1).join('·').trim()}</div>
      <div class="wp-tags">${tags}</div>
    </div>`;

  /* Ao clicar num item da sidebar:
       1. Remove .active de todos os itens
       2. Adiciona .active no item clicado
       3. Reposiciona o viewport do mapa centrado no waypoint
       4. Redesenha o mapa
       5. Exibe o tooltip sobre o marcador */
  div.addEventListener('click', () => {
    document.querySelectorAll('.waypoint').forEach(w => w.classList.remove('active'));
    div.classList.add('active');
    /* Calcula novos offsets para centralizar o waypoint no canvas */
    const W = mc.offsetWidth, H = mc.offsetHeight;
    const [nx, ny] = geo2n(wp.lat, wp.lon);
    offX = nx*scale - W/2;
    offY = ny*scale - H/2;
    drawMap();
    const [sx, sy] = toScreen(wp.lat, wp.lon);
    showTip(sx, sy, wp);
  });

  wpList.appendChild(div);
});


/* ════════════════════════════════════════════════════════════════════════════
   BLOCO 5 — TOOLTIP
   ────────────────────────────────────────────────────────────────────────────
   O tooltip é um div absoluto (#mapTooltip) que flutua sobre o canvas.
   Seu conteúdo e posição são calculados por showTip() a cada clique.
   ════════════════════════════════════════════════════════════════════════════ */
const tip = document.getElementById('mapTooltip');

/**
 * showTip — Exibe o tooltip flutuante com informações de um waypoint.
 * Ajusta a posição para que o tooltip não saia dos limites do mapa.
 *
 * @param {number} sx  coordenada X do waypoint em pixels (relativa ao canvas)
 * @param {number} sy  coordenada Y do waypoint em pixels
 * @param {object} wp  objeto waypoint com km, ele, name, desc, type
 *
 * DEPURAÇÃO: Se o tooltip não aparecer, verificar se tip.style.display
 * está sendo definido como 'block' e se sx/sy são valores válidos.
 */
function showTip(sx, sy, wp) {
  const W = mc.offsetWidth, H = mc.offsetHeight;
  /* Monta o HTML interno do tooltip */
  tip.innerHTML = `
    <div class="tt-km">KM ${wp.km.toFixed(1)} · ${wp.ele}m</div>
    <div style="font-weight:600;color:${WPC2[wp.type]||'var(--text)'};">${wp.name}</div>
    <div style="font-size:.68rem;color:var(--muted);margin-top:.15rem;">${wp.desc}</div>`;
  /* Posição padrão: 10px à direita e 10px acima do clique */
  let tx = sx+10, ty = sy-10;
  /* Ajuste de borda: evita que o tooltip saia pela direita */
  if(tx + 200 > W) tx = sx - 210;
  /* Ajuste de borda: evita que o tooltip saia por baixo ou pelo topo */
  if(ty + 80  > H) ty = H - 85;
  if(ty < 0)       ty = 5;
  tip.style.left    = tx + 'px';
  tip.style.top     = ty + 'px';
  tip.style.display = 'block';
}

/* Listener de clique no canvas do mapa.
   Itera sobre todos os waypoints para encontrar o mais próximo do clique.
   Se um waypoint estiver dentro de 15px do clique → mostra tooltip + destaca sidebar.
   Clique em área vazia → oculta o tooltip. */
mc.addEventListener('click', e => {
  const r = mc.getBoundingClientRect();
  const mx2 = e.clientX - r.left;  /* posição do clique relativa ao canvas */
  const my2 = e.clientY - r.top;
  let hit = null, hd = 15; /* hd = distância mínima de detecção (15px) */

  waypoints.forEach((wp, i) => {
    const [sx, sy] = toScreen(wp.lat, wp.lon);
    const d = Math.hypot(sx-mx2, sy-my2); /* distância euclidiana */
    if(d < hd){ hit = {wp, i, sx, sy}; hd = d; } /* mantém o mais próximo */
  });

  if(hit){
    /* Destaca o item correspondente na sidebar */
    document.querySelectorAll('.waypoint').forEach(w => w.classList.remove('active'));
    wpList.children[hit.i]?.classList.add('active');
    wpList.children[hit.i]?.scrollIntoView({block:'nearest', behavior:'smooth'});
    showTip(hit.sx, hit.sy, hit.wp);
  } else {
    tip.style.display = 'none'; /* oculta se clicou fora de qualquer waypoint */
  }
});


/* ════════════════════════════════════════════════════════════════════════════
   BLOCO 6 — INTERAÇÕES: Pan, Zoom por scroll, Zoom por botões, Touch
   ════════════════════════════════════════════════════════════════════════════ */

/* ── Pan com mouse (arrastar) ────────────────────────────────────────────────
   mousedown → inicia arraste, guarda posição inicial
   mousemove → atualiza offX/offY com o delta do movimento
   mouseup   → finaliza arraste
   NOTA: mousemove e mouseup escutam no window (não no canvas) para evitar
   que o arraste seja interrompido ao sair dos limites do canvas. */
mc.addEventListener('mousedown', e => {
  dragging = true;
  dStart = [e.clientX, e.clientY]; /* posição inicial do cursor */
  oStart = [offX, offY];           /* offsets iniciais do viewport */
  tip.style.display = 'none';      /* oculta tooltip durante arraste */
});
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  offX = oStart[0] - (e.clientX - dStart[0]); /* inverte: arrastar direita → move mapa para direita */
  offY = oStart[1] - (e.clientY - dStart[1]);
  drawMap();
});
window.addEventListener('mouseup', () => { dragging = false; });

/* ── Zoom por scroll da roda do mouse ───────────────────────────────────────
   Zoom centrado na posição do cursor (não no centro do canvas).
   Fator de zoom: 1.12× por notch do scroll.
   preventDefault evita que a página role durante o zoom. */
mc.addEventListener('wheel', e => {
  e.preventDefault();
  const r = mc.getBoundingClientRect();
  const px = e.clientX - r.left; /* posição do cursor no canvas */
  const py = e.clientY - r.top;
  const f = e.deltaY < 0 ? 1.12 : 1/1.12; /* scroll para cima = ampliar */
  /* Reposiciona os offsets para manter o ponto sob o cursor fixo */
  offX = px - (px - offX) * f;
  offY = py - (py - offY) * f;
  scale *= f;
  drawMap();
}, {passive: false}); /* passive:false é necessário para preventDefault() funcionar */

/* ── Zoom por botões (+/−/⊡) ────────────────────────────────────────────────
   Zoom centrado no centro do canvas (diferente do zoom por scroll). */
document.getElementById('zoomIn').onclick = () => {
  const W=mc.offsetWidth, H=mc.offsetHeight;
  offX = W/2 - (W/2 - offX)*1.3;  /* expande em torno do centro */
  offY = H/2 - (H/2 - offY)*1.3;
  scale *= 1.3; drawMap();
};
document.getElementById('zoomOut').onclick = () => {
  const W=mc.offsetWidth, H=mc.offsetHeight;
  offX = W/2 - (W/2 - offX)/1.3;  /* contrai em torno do centro */
  offY = H/2 - (H/2 - offY)/1.3;
  scale /= 1.3; drawMap();
};
/* Botão ⊡ recalcula fitBounds e mostra a rota completa */
document.getElementById('zoomFit').onclick = () => { fitBounds(); drawMap(); };

/* ── Suporte a touch (mobile/tablet) ────────────────────────────────────────
   1 dedo  → pan (arrastar)
   2 dedos → pinch-to-zoom
   tDist   → distância entre dedos no frame anterior (para calcular fator de zoom) */
let tDist = null;

mc.addEventListener('touchstart', e => {
  if(e.touches.length === 1){
    dragging = true;
    dStart = [e.touches[0].clientX, e.touches[0].clientY];
    oStart = [offX, offY];
  }
}, {passive: true});

mc.addEventListener('touchmove', e => {
  e.preventDefault(); /* evita scroll da página */
  if(e.touches.length === 1 && dragging){
    /* Pan com 1 dedo */
    offX = oStart[0] - (e.touches[0].clientX - dStart[0]);
    offY = oStart[1] - (e.touches[0].clientY - dStart[1]);
    drawMap();
  } else if(e.touches.length === 2){
    /* Pinch-to-zoom com 2 dedos */
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if(tDist){
      const f = d / tDist; /* fator de zoom relativo ao frame anterior */
      /* Centro do pinch como pivot do zoom */
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const r  = mc.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      offX = px - (px - offX) * f;
      offY = py - (py - offY) * f;
      scale *= f;
      drawMap();
    }
    tDist = d; /* atualiza para o próximo frame */
  }
}, {passive: false});

mc.addEventListener('touchend', () => { dragging = false; tDist = null; });


/* ════════════════════════════════════════════════════════════════════════════
   BLOCO 7 — INICIALIZAÇÃO
   ────────────────────────────────────────────────────────────────────────────
   ResizeObserver monitora mudanças de tamanho dos containers e redesenha
   os canvas automaticamente (responsivo a redimensionamento de janela e
   layout changes).
   A ordem importa: fitBounds() precisa ser chamada antes de drawMap().
   ════════════════════════════════════════════════════════════════════════════ */

/* Observa redimensionamento do container do mapa → redesenha mapa */
new ResizeObserver(() => { drawMap(); drawElev(); })
  .observe(document.getElementById('map-wrap'));

/* Observa redimensionamento do container da elevação → redesenha elevação */
new ResizeObserver(() => drawElev())
  .observe(document.getElementById('elev-wrap'));

/* Renderização inicial: calcula bounds → desenha mapa → desenha elevação */
fitBounds();
drawMap();
drawElev();

</script>
</body>
