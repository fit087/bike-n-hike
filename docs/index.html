<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazenda Continente — Itinerário</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap');

:root {
  --bg: #0e0f0d;
  --surface: #161714;
  --border: #2a2b27;
  --accent: #c8f060;
  --accent2: #f0a040;
  --accent3: #60c8f0;
  --text: #e8e9e3;
  --muted: #7a7b74;
  --danger: #f06060;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'DM Sans','Segoe UI',sans-serif; font-weight:300;
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}
header {
  display:grid; grid-template-columns:1fr auto; align-items:end;
  padding:1.5rem 2rem 1rem; border-bottom:1px solid var(--border);
  gap:1rem; flex-shrink:0;
}
.route-title {
  font-family:'Bebas Neue','Arial Black',sans-serif;
  font-size:clamp(2.2rem,4.5vw,4rem); letter-spacing:.04em; line-height:.95;
  color:var(--accent); text-shadow:0 0 40px rgba(200,240,96,.2);
}
.route-subtitle {
  font-size:.68rem; font-family:'DM Mono',monospace; color:var(--muted);
  letter-spacing:.14em; text-transform:uppercase; margin-top:.3rem;
}
.stats-header { display:flex; gap:1.5rem; text-align:right; }
.stat-item { display:flex; flex-direction:column; gap:.1rem; }
.stat-val { font-family:'Bebas Neue','Arial Black',sans-serif; font-size:1.8rem; color:var(--text); line-height:1; }
.stat-val span { font-size:.8rem; color:var(--muted); }
.stat-label { font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.15em; color:var(--muted); text-transform:uppercase; }

main { display:grid; grid-template-columns:300px 1fr; flex:1; min-height:0; overflow:hidden; }

.sidebar { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.section-title {
  font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.2em; text-transform:uppercase;
  color:var(--muted); padding:.9rem 1.2rem .5rem; border-bottom:1px solid var(--border);
  background:var(--surface); flex-shrink:0;
}
.waypoint-list { flex:1; overflow-y:auto; }
.waypoint-list::-webkit-scrollbar { width:3px; }
.waypoint-list::-webkit-scrollbar-thumb { background:var(--border); }

.waypoint { display:grid; grid-template-columns:34px 1fr; cursor:pointer; transition:background .15s; }
.waypoint:hover { background:rgba(200,240,96,.04); }
.waypoint.active { background:rgba(200,240,96,.08); }
.wp-line { display:flex; flex-direction:column; align-items:center; padding:.7rem 0; }
.wp-dot {
  width:9px; height:9px; border-radius:50%; border:2px solid var(--accent);
  background:var(--bg); flex-shrink:0; z-index:2; transition:box-shadow .2s;
}
.waypoint.start .wp-dot { width:13px; height:13px; background:var(--accent); }
.waypoint.end   .wp-dot { width:13px; height:13px; background:var(--danger); border-color:var(--danger); }
.waypoint.turn  .wp-dot { border-color:var(--accent2); background:rgba(240,160,64,.2); }
.waypoint.bifurcation .wp-dot { border-color:var(--accent3); background:rgba(96,200,240,.2); width:11px; height:11px; }
.waypoint.peak  .wp-dot { border-color:var(--accent); background:rgba(200,240,96,.2); }
.waypoint.active .wp-dot { box-shadow:0 0 0 3px rgba(200,240,96,.25); }
.wp-connector { width:1px; flex:1; background:var(--border); margin-top:2px; }
.waypoint:last-child .wp-connector { display:none; }
.wp-info { padding:.7rem .9rem .7rem 0; border-bottom:1px solid rgba(42,43,39,.5); }
.wp-km { font-family:'DM Mono',monospace; font-size:.58rem; color:var(--muted); letter-spacing:.08em; margin-bottom:.15rem; }
.wp-name { font-size:.82rem; font-weight:400; color:var(--text); line-height:1.3; }
.wp-desc { font-size:.68rem; color:var(--muted); margin-top:.15rem; }
.wp-tags { margin-top:.25rem; display:flex; gap:.25rem; flex-wrap:wrap; }
.tag { font-family:'DM Mono',monospace; font-size:.52rem; letter-spacing:.08em; padding:.1rem .35rem; border-radius:2px; text-transform:uppercase; }
.tag-turn    { background:rgba(240,160,64,.12); color:var(--accent2); border:1px solid rgba(240,160,64,.3); }
.tag-bifurc  { background:rgba(96,200,240,.1);  color:var(--accent3); border:1px solid rgba(96,200,240,.3); }
.tag-climb   { background:rgba(200,240,96,.1);  color:var(--accent);  border:1px solid rgba(200,240,96,.25); }
.tag-descent { background:rgba(240,96,96,.1);   color:var(--danger);  border:1px solid rgba(240,96,96,.25); }
.tag-start   { background:rgba(200,240,96,.2);  color:var(--accent);  border:1px solid var(--accent); }
.tag-end     { background:rgba(240,96,96,.2);   color:var(--danger);  border:1px solid var(--danger); }

.legend { padding:.7rem 1.2rem; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:.4rem .9rem; flex-shrink:0; }
.legend-item { display:flex; align-items:center; gap:.3rem; font-size:.62rem; color:var(--muted); font-family:'DM Mono',monospace; }
.legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.right-panel { display:flex; flex-direction:column; min-height:0; overflow:hidden; }

#map-wrap { flex:1; position:relative; min-height:0; overflow:hidden; background:#111210; }
canvas#mapCanvas { display:block; width:100%; height:100%; cursor:grab; }
canvas#mapCanvas:active { cursor:grabbing; }

.map-badge {
  position:absolute; top:.8rem; right:.8rem;
  background:rgba(14,15,13,.85); border:1px solid var(--border); border-radius:4px;
  padding:.45rem .7rem; font-family:'DM Mono',monospace; font-size:.58rem;
  color:var(--muted); pointer-events:none; line-height:1.7;
}
.map-badge strong { color:var(--text); }
.zoom-controls { position:absolute; bottom:.8rem; right:.8rem; display:flex; flex-direction:column; gap:2px; }
.zoom-btn {
  width:26px; height:26px; background:rgba(22,23,20,.9); border:1px solid var(--border);
  color:var(--text); font-size:.95rem; cursor:pointer; display:flex; align-items:center;
  justify-content:center; user-select:none; transition:background .15s; border-radius:2px;
}
.zoom-btn:hover { background:var(--surface); }

.map-tooltip {
  position:absolute; pointer-events:none; background:rgba(22,23,20,.94);
  border:1px solid var(--border); border-radius:3px; padding:.4rem .6rem;
  font-size:.7rem; color:var(--text); display:none; max-width:190px; z-index:10; line-height:1.5;
}
.map-tooltip .tt-km { font-family:'DM Mono',monospace; font-size:.58rem; color:var(--muted); }

#elev-wrap { flex-shrink:0; border-top:1px solid var(--border); padding:.5rem 1rem .4rem; background:var(--surface); }
.elev-title { font-family:'DM Mono',monospace; font-size:.56rem; letter-spacing:.15em; color:var(--muted); text-transform:uppercase; margin-bottom:.3rem; }
canvas#elevCanvas { display:block; width:100%; height:75px; }

@media(max-width:680px){
  main { grid-template-columns:1fr; grid-template-rows:60vh 40vh; }
  .sidebar { order:2; grid-row:2; max-height:40vh; }
  .right-panel { order:1; grid-row:1; }
  header { grid-template-columns:1fr; padding:1rem; }
  .stats-header { justify-content:flex-start; }
}
</style>
</head>

// ── Map engine ────────────────────────────────────────────────────
const mc = document.getElementById('mapCanvas');
const mx = mc.getContext('2d');

const cosLat = Math.cos(-21.685 * Math.PI / 180);
let scale = 1, offX = 0, offY = 0;
let dragging = false, dStart, oStart;

function geo2n(lat, lon) {
  return [(lon - (-43.385)) * cosLat, -( lat - (-21.685))];
}

function fitBounds() {
  const W = mc.offsetWidth, H = mc.offsetHeight;
  const pts = track.map(p => geo2n(p[0], p[1]));
  const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
  const mnx=Math.min(...xs),mxx=Math.max(...xs),mny=Math.min(...ys),mxy=Math.max(...ys);
  const rx=mxx-mnx, ry=mxy-mny, pad=0.1;
  scale = Math.min(W/((rx)*(1+pad*2)), H/((ry)*(1+pad*2)));
  offX = ((mnx+mxx)/2)*scale - W/2;
  offY = ((mny+mxy)/2)*scale - H/2;
}

function toScreen(lat, lon) {
  const [nx,ny] = geo2n(lat, lon);
  return [nx*scale - offX, ny*scale - offY];
}

function drawMap() {
  const dpr = window.devicePixelRatio||1;
  const W = mc.offsetWidth, H = mc.offsetHeight;
  if (mc.width !== W*dpr || mc.height !== H*dpr) {
    mc.width = W*dpr; mc.height = H*dpr;
    mx.scale(dpr,dpr);
    fitBounds();
  }
  mx.clearRect(0,0,W,H);
  mx.fillStyle='#111210'; mx.fillRect(0,0,W,H);

  // Dot grid
  mx.fillStyle='rgba(42,43,39,0.45)';
  for(let x=0;x<W;x+=28) for(let y=0;y<H;y+=28) mx.fillRect(x,y,1,1);

  // Route
  mx.beginPath();
  const [sx0,sy0]=toScreen(track[0][0],track[0][1]);
  mx.moveTo(sx0,sy0);
  for(let i=1;i<track.length;i++){
    const [sx,sy]=toScreen(track[i][0],track[i][1]);
    mx.lineTo(sx,sy);
  }
  mx.strokeStyle='rgba(200,240,96,0.72)'; mx.lineWidth=2.5;
  mx.lineCap='round'; mx.lineJoin='round'; mx.stroke();

  // Route glow
  mx.beginPath();
  mx.moveTo(sx0,sy0);
  for(let i=1;i<track.length;i++){
    const [sx,sy]=toScreen(track[i][0],track[i][1]);
    mx.lineTo(sx,sy);
  }
  mx.strokeStyle='rgba(200,240,96,0.12)'; mx.lineWidth=7; mx.stroke();

  // Direction arrows
  mx.fillStyle='rgba(200,240,96,0.38)';
  for(let i=12;i<track.length-8;i+=24){
    const [x1,y1]=toScreen(track[i][0],track[i][1]);
    const [x2,y2]=toScreen(track[i+5][0],track[i+5][1]);
    const ang=Math.atan2(y2-y1,x2-x1);
    const s=4.5;
    mx.save(); mx.translate((x1+x2)/2,(y1+y2)/2); mx.rotate(ang);
    mx.beginPath(); mx.moveTo(s,0); mx.lineTo(-s,-s*.6); mx.lineTo(-s,s*.6);
    mx.closePath(); mx.fill(); mx.restore();
  }

  // Waypoints
  const WPC = {start:'#c8f060',end:'#f06060',bifurcation:'#60c8f0',turn:'#f0a040',peak:'#c8f060'};
  const WPS = {start:7,end:7,bifurcation:6,turn:4.5,peak:5.5};
  waypoints.forEach(wp=>{
    const [sx,sy]=toScreen(wp.lat,wp.lon);
    const c=WPC[wp.type]||'#f0a040', r=WPS[wp.type]||4.5;
    // glow
    mx.beginPath(); mx.arc(sx,sy,r+5,0,Math.PI*2);
    mx.fillStyle=c+'18'; mx.fill();
    // ring for bifurcation
    if(wp.type==='bifurcation'){
      mx.beginPath(); mx.arc(sx,sy,r+3,0,Math.PI*2);
      mx.strokeStyle=c+'55'; mx.lineWidth=1; mx.stroke();
    }
    // dot
    mx.beginPath(); mx.arc(sx,sy,r,0,Math.PI*2);
    mx.fillStyle=(wp.type==='start'||wp.type==='end')?c:'#111210';
    mx.fill();
    mx.strokeStyle=c; mx.lineWidth=1.8; mx.stroke();
  });

  // Compass
  const cx=W-36,cy=36,cr=14;
  mx.save(); mx.globalAlpha=.4;
  mx.beginPath(); mx.moveTo(cx,cy-cr); mx.lineTo(cx-cr*.35,cy); mx.lineTo(cx+cr*.35,cy); mx.closePath();
  mx.fillStyle='#c8f060'; mx.fill();
  mx.beginPath(); mx.moveTo(cx,cy+cr); mx.lineTo(cx-cr*.35,cy); mx.lineTo(cx+cr*.35,cy); mx.closePath();
  mx.fillStyle='#444'; mx.fill();
  mx.globalAlpha=.65; mx.fillStyle='#c8f060'; mx.font=`bold ${cr*.6}px monospace`;
  mx.textAlign='center'; mx.fillText('N',cx,cy-cr-3);
  mx.restore();
}

// Elevation chart
const ec=document.getElementById('elevCanvas');
const ectx=ec.getContext('2d');
function drawElev(){
  const dpr=window.devicePixelRatio||1;
  const W=ec.offsetWidth,H=ec.offsetHeight;
  ec.width=W*dpr; ec.height=H*dpr; ectx.scale(dpr,dpr);
  const minE=650,maxE=860,pL=5,pR=5,pT=5,pB=16,w=W-pL-pR,h=H-pT-pB;
  const toX=km=>pL+(km/39.3)*w, toY=e=>pT+h-((e-minE)/(maxE-minE))*h;
  ectx.fillStyle='#161714'; ectx.fillRect(0,0,W,H);
  // grid
  ectx.strokeStyle='rgba(42,43,39,.8)'; ectx.lineWidth=.5;
  [700,750,800,850].forEach(e=>{
    ectx.beginPath(); ectx.moveTo(pL,toY(e)); ectx.lineTo(pL+w,toY(e)); ectx.stroke();
    ectx.fillStyle='rgba(122,123,116,.5)'; ectx.font='6.5px monospace';
    ectx.fillText(e+'m',pL+2,toY(e)-2);
  });
  // fill
  const g=ectx.createLinearGradient(0,pT,0,pT+h);
  g.addColorStop(0,'rgba(200,240,96,.3)'); g.addColorStop(1,'rgba(200,240,96,.02)');
  ectx.beginPath(); ectx.moveTo(toX(elevData[0][0]),toY(elevData[0][1]));
  elevData.forEach(([km,e])=>ectx.lineTo(toX(km),toY(e)));
  ectx.lineTo(toX(elevData[elevData.length-1][0]),pT+h); ectx.lineTo(toX(0),pT+h);
  ectx.closePath(); ectx.fillStyle=g; ectx.fill();
  // line
  ectx.beginPath(); ectx.moveTo(toX(elevData[0][0]),toY(elevData[0][1]));
  elevData.forEach(([km,e])=>ectx.lineTo(toX(km),toY(e)));
  ectx.strokeStyle='#c8f060'; ectx.lineWidth=1.5; ectx.lineJoin='round'; ectx.stroke();
  // ticks
  const C2={start:'#c8f060',end:'#f06060',bifurcation:'#60c8f0',turn:'#f0a040',peak:'#c8f060'};
  waypoints.forEach(wp=>{
    const x=toX(wp.km);
    ectx.beginPath(); ectx.moveTo(x,pT+h+1); ectx.lineTo(x,pT+h+6);
    ectx.strokeStyle=C2[wp.type]||'#f0a040';
    ectx.lineWidth=wp.type==='bifurcation'?1.8:1; ectx.stroke();
  });
  // km labels
  ectx.fillStyle='rgba(122,123,116,.55)'; ectx.font='6.5px monospace'; ectx.textAlign='center';
  [0,10,20,30,39].forEach(km=>ectx.fillText(km===39?'39km':km,toX(km),pT+h+13));
}

// Sidebar
const wpList=document.getElementById('wpList');
const TL={turn:'CURVA',bifurcation:'BIFURCAÇÃO',climb:'SUBIDA',descent:'DESCIDA',start:'PARTIDA',end:'CHEGADA',bifurc:'BIFURCAÇÃO',peak:'PICO'};
const TC={turn:'tag-turn',bifurcation:'tag-bifurc',climb:'tag-climb',descent:'tag-descent',start:'tag-start',end:'tag-end',bifurc:'tag-bifurc',peak:'tag-climb'};
const WPC2={start:'#c8f060',end:'#f06060',bifurcation:'#60c8f0',turn:'#f0a040',peak:'#c8f060'};

waypoints.forEach((wp,idx)=>{
  const div=document.createElement('div');
  div.className=`waypoint ${wp.type}`;
  const tags=wp.tags.map(t=>`<span class="tag ${TC[t]||'tag-turn'}">${TL[t]||t}</span>`).join('');
  div.innerHTML=`
    <div class="wp-line"><div class="wp-dot"></div><div class="wp-connector"></div></div>
    <div class="wp-info">
      <div class="wp-km">KM ${wp.km.toFixed(1)} · ${wp.ele}m alt.</div>
      <div class="wp-name">${wp.name}</div>
      <div class="wp-desc">${wp.desc.split('·').slice(1).join('·').trim()}</div>
      <div class="wp-tags">${tags}</div>
    </div>`;
  div.addEventListener('click',()=>{
    document.querySelectorAll('.waypoint').forEach(w=>w.classList.remove('active'));
    div.classList.add('active');
    // Center on wp
    const W=mc.offsetWidth, H=mc.offsetHeight;
    const [nx,ny]=geo2n(wp.lat,wp.lon);
    offX=nx*scale-W/2; offY=ny*scale-H/2;
    drawMap();
    const [sx,sy]=toScreen(wp.lat,wp.lon);
    showTip(sx,sy,wp);
  });
  wpList.appendChild(div);
});

// Tooltip
const tip=document.getElementById('mapTooltip');
function showTip(sx,sy,wp){
  const W=mc.offsetWidth,H=mc.offsetHeight;
  tip.innerHTML=`<div class="tt-km">KM ${wp.km.toFixed(1)} · ${wp.ele}m</div>
    <div style="font-weight:600;color:${WPC2[wp.type]||'var(--text)'};">${wp.name}</div>
    <div style="font-size:.68rem;color:var(--muted);margin-top:.15rem;">${wp.desc}</div>`;
  let tx=sx+10,ty=sy-10;
  if(tx+200>W) tx=sx-210;
  if(ty+80>H) ty=H-85;
  if(ty<0) ty=5;
  tip.style.left=tx+'px'; tip.style.top=ty+'px'; tip.style.display='block';
}
mc.addEventListener('click',e=>{
  const r=mc.getBoundingClientRect(), mx2=e.clientX-r.left, my2=e.clientY-r.top;
  let hit=null,hd=15;
  waypoints.forEach((wp,i)=>{
    const [sx,sy]=toScreen(wp.lat,wp.lon);
    const d=Math.hypot(sx-mx2,sy-my2);
    if(d<hd){hit={wp,i,sx,sy};hd=d;}
  });
  if(hit){
    document.querySelectorAll('.waypoint').forEach(w=>w.classList.remove('active'));
    wpList.children[hit.i]?.classList.add('active');
    wpList.children[hit.i]?.scrollIntoView({block:'nearest',behavior:'smooth'});
    showTip(hit.sx,hit.sy,hit.wp);
  } else tip.style.display='none';
});

// Pan
mc.addEventListener('mousedown',e=>{dragging=true;dStart=[e.clientX,e.clientY];oStart=[offX,offY];tip.style.display='none';});
window.addEventListener('mousemove',e=>{if(!dragging)return;offX=oStart[0]-(e.clientX-dStart[0]);offY=oStart[1]-(e.clientY-dStart[1]);drawMap();});
window.addEventListener('mouseup',()=>dragging=false);

// Wheel zoom
mc.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=mc.getBoundingClientRect(),px=e.clientX-r.left,py=e.clientY-r.top;
  const f=e.deltaY<0?1.12:1/1.12;
  offX=px-(px-offX)*f; offY=py-(py-offY)*f; scale*=f; drawMap();
},{passive:false});

// Zoom buttons
document.getElementById('zoomIn').onclick=()=>{
  const W=mc.offsetWidth,H=mc.offsetHeight;
  offX=W/2-(W/2-offX)*1.3; offY=H/2-(H/2-offY)*1.3; scale*=1.3; drawMap();};
document.getElementById('zoomOut').onclick=()=>{
  const W=mc.offsetWidth,H=mc.offsetHeight;
  offX=W/2-(W/2-offX)/1.3; offY=H/2-(H/2-offY)/1.3; scale/=1.3; drawMap();};
document.getElementById('zoomFit').onclick=()=>{fitBounds();drawMap();};

// Touch
let tDist=null;
mc.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;dStart=[e.touches[0].clientX,e.touches[0].clientY];oStart=[offX,offY];}
},{passive:true});
mc.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    offX=oStart[0]-(e.touches[0].clientX-dStart[0]);
    offY=oStart[1]-(e.touches[0].clientY-dStart[1]);
    drawMap();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(tDist){
      const f=d/tDist;
      const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const r=mc.getBoundingClientRect();
      const px=cx-r.left,py=cy-r.top;
      offX=px-(px-offX)*f; offY=py-(py-offY)*f; scale*=f; drawMap();
    }
    tDist=d;
  }
},{passive:false});
mc.addEventListener('touchend',()=>{dragging=false;tDist=null;});

// Init
new ResizeObserver(()=>{drawMap();drawElev();}).observe(document.getElementById('map-wrap'));
new ResizeObserver(()=>drawElev()).observe(document.getElementById('elev-wrap'));
fitBounds(); drawMap(); drawElev();
</script>
